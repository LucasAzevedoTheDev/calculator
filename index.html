<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Trirong">
  <script src="scripts.js" defer></script> 
</head>
<body>
  <div class="calculator">
    <div class="display"></div>
    <div class="keyboard">
      <button class="buttons operator del">DEL</button>
      <button class="buttons operator ac">AC</button>
      <button class="buttons operator percent">%</button>
      <button class="buttons operator divisor">÷</button>
      <button class="buttons seven">7</button>
      <button class="buttons eight">8</button>
      <button class="buttons nine">9</button>
      <button class="buttons operator multiply">X</button>
      <button class="buttons four">4</button>
      <button class="buttons five">5</button>
      <button class="buttons six">6</button>
      <button class="buttons operator minus">-</button>
      <button class="buttons one">1</button>
      <button class="buttons two">2</button>
      <button class="buttons three">3</button>
      <button class="buttons operator plus">+</button>
      <button class="buttons zero">0</button>
      <button class="buttons comma">,</button>
      <button class="buttons operator equal">=</button>
    </div>
  </div>
</body>
</html>
