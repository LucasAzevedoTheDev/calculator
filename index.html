<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Trirong">
  <script src="scripts.js" defer></script> 
</head>
<body>
  <div class="calculator">
    <div class="display"></div>
    <div class="keyboard">
      <button class="buttons operator del">DEL</button>
      <button class="buttons operator ac">AC</button>
      <button class="buttons operator %">%</button>
      <button class="buttons operator divisor">÷</button>
      <button class="buttons 7">7</button>
      <button class="buttons 8">8</button>
      <button class="buttons 9">9</button>
      <button class="buttons operator x">X</button>
      <button class="buttons 4">4</button>
      <button class="buttons 5">5</button>
      <button class="buttons 6">6</button>
      <button class="buttons operator -">-</button>
      <button class="buttons 1">1</button>
      <button class="buttons 2">2</button>
      <button class="buttons 3">3</button>
      <button class="buttons operator +">+</button>
      <button class="buttons 0">0</button>
      <button class="buttons ,">,</button>
      <button class="buttons operator equal">=</button>
    </div>
  </div>
</body>
</html>
